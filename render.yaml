services:
  - type: web
    name: salud-preventiva-puno-api
    runtime: docker
    rootDir: backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: salud-preventiva-puno-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: CORS_ORIGINS
        value: http://localhost:5173
      - key: SENAMHI_API_URL
        value: https://senamhi.gob.pe/api/
      - key: RENIPRESS_CSV_URL
        value: https://www.susalud.gob.pe/registro-nacional/

databases:
  - name: salud-preventiva-puno-db
    plan: free
