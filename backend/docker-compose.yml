services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: salud_puno
      POSTGRES_USER: salud_user
      POSTGRES_PASSWORD: salud_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salud_user -d salud_puno"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  backend:
    build: .
    env_file:
      - .env.example
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    image: nginx:1.27-alpine
    volumes:
      - ../frontend/dist:/usr/share/nginx/html:ro
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:

